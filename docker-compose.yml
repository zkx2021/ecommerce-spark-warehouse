name: ecommerce-spark-warehouse

services:
  namenode:
    image: apache/hadoop:3.3.6
    container_name: esw-namenode
    command:
      - bash
      - -c
      - >-
        if [ ! -d /tmp/hadoop-root/dfs/name/current ]; then
          hdfs namenode -format -force -nonInteractive;
        fi;
        hdfs namenode
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - namenode-data:/tmp/hadoop-root/dfs/name
      - ./deploy/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./deploy/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro

  datanode:
    image: apache/hadoop:3.3.6
    container_name: esw-datanode
    command: ["hdfs", "datanode"]
    depends_on:
      - namenode
    ports:
      - "9864:9864"
    volumes:
      - datanode-data:/tmp/hadoop-root/dfs/data
      - ./deploy/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./deploy/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro

  mysql:
    image: mysql:8.4
    container_name: esw-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ecommerce_ads
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init/01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro

  spark-master:
    image: bitnami/spark:3.5
    container_name: esw-spark-master
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8081:8080"

  spark-worker:
    image: bitnami/spark:3.5
    container_name: esw-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
    depends_on:
      - spark-master

  hive-metastore:
    build:
      context: ./deploy/hive
    image: ecommerce-hive:4.0.0-mysql
    container_name: esw-hive-metastore
    restart: unless-stopped
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: mysql
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionURL=jdbc:mysql://mysql:3306/hive_metastore
        -Djavax.jdo.option.ConnectionDriverName=com.mysql.cj.jdbc.Driver
        -Djavax.jdo.option.ConnectionUserName=ecommerce
        -Djavax.jdo.option.ConnectionPassword=ecommerce_password
        -Dhive.metastore.warehouse.dir=hdfs://namenode:8020/user/hive/warehouse
    depends_on:
      mysql:
        condition: service_healthy
      namenode:
        condition: service_started
    ports:
      - "9083:9083"
    volumes:
      - ./deploy/hadoop/core-site.xml:/opt/hive/conf/core-site.xml:ro
      - ./deploy/hadoop/hdfs-site.xml:/opt/hive/conf/hdfs-site.xml:ro

  hive-server2:
    build:
      context: ./deploy/hive
    image: ecommerce-hive:4.0.0-mysql
    container_name: esw-hive-server2
    restart: unless-stopped
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
        -Dhive.metastore.warehouse.dir=hdfs://namenode:8020/user/hive/warehouse
    depends_on:
      hive-metastore:
        condition: service_started
    ports:
      - "10000:10000"
    volumes:
      - ./deploy/hadoop/core-site.xml:/opt/hive/conf/core-site.xml:ro
      - ./deploy/hadoop/hdfs-site.xml:/opt/hive/conf/hdfs-site.xml:ro

volumes:
  namenode-data:
  datanode-data:
  mysql-data:
